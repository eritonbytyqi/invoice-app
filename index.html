<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JM COPERTURE Preventivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --success-color: #10b981;
            --dark-color: #1e293b;
            --bg-body: #f1f5f9;
        }

        body { 
            background-color: var(--bg-body); 
            font-family: 'Inter', sans-serif; 
            color: var(--dark-color);
        }

        .invoice-box { 
            background: #ffffff; 
            padding: 50px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
            margin-top: 30px;
            margin-bottom: 30px;
        }

        .invoice-header { 
            border-bottom: 2px solid #f8fafc;
            padding-bottom: 30px;
            margin-bottom: 40px;
        }

        .form-control, .form-select {
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 12px 15px;
        }

        .client-display { 
            background: #f8fafc; 
            padding: 25px; 
            border-radius: 16px; 
            border-left: 5px solid var(--primary-color);
            margin-bottom: 30px;
        }

        .table thead { 
            background: var(--dark-color); 
            color: white; 
        }

        .total-box { 
            background: var(--dark-color); 
            color: white;
            border-radius: 16px; 
            padding: 25px;
        }

        .total-final { font-size: 1.8rem; font-weight: 700; }

        .btn-modern { 
            border-radius: 12px; 
            padding: 12px 25px; 
            font-weight: 600;
            transition: all 0.3s;
        }

        @media print {
            .no-print, .btn-modern { display: none !important; }
            .invoice-box { box-shadow: none; border: none; padding: 0; }
            body { background: white; }
        }
    </style>
</head>
<body class="container py-4">

<div class="invoice-box">
    <div class="mb-4 no-print text-end">
        <label class="small fw-bold me-2 text-secondary">LANGUAGE / GJUHA:</label>
        <select id="languageSelect" class="form-select w-auto d-inline shadow-sm">
            <option value="sq">Shqip 🇦🇱</option>
            <option value="it">Italiano 🇮🇹</option>
            <option value="en">English 🇬🇧</option>
        </select>
    </div>

    <div class="text-center mb-3">
        <h1 class="fw-bold text-primary">JM COPERTURE</h1>
    </div> 

    <div class="invoice-header row align-items-center">
        <div class="col-md-6 text-center text-md-start">
            <p class="text-secondary mb-0">
                <span class="d-block">📞 3278529103</span>
                <span class="d-block">✉️ jeton.kozhani@icloud.com</span>
            </p>
        </div>
        <div class="col-md-6 text-center text-md-end mt-4 mt-md-0">
            <h2 class="fw-bold text-uppercase mb-1" id="invoiceTitle">Preventivo</h2>
            <div class="badge bg-light text-dark border p-2 px-3 mb-2">P.Iva 04510060983</div>
            <div class="text-secondary small">
                <strong id="labelDate">Data:</strong> <span id="dateText" class="text-dark"></span>
            </div>
        </div>
    </div>

    <div class="row gx-3 gy-2 no-print bg-light p-3 rounded-4 mb-3">
        <div class="col-md-6">
            <label class="form-label fw-semibold small" id="labelClientName">Emri i Klientit</label>
            <input type="text" id="clientName" class="form-control" placeholder="..." oninput="updateClient()">
        </div>
        <div class="col-md-6">
            <label class="form-label fw-semibold small" id="labelClientAddress">Adresa e Klientit</label>
            <input type="text" id="clientAddress" class="form-control" placeholder="..." oninput="updateClient()">
        </div>
    </div>

    <div class="client-display shadow-sm p-3 rounded-4 mb-3">
        <div class="d-flex justify-content-between align-items-center flex-wrap">
            <div class="me-3 flex-grow-1">
                <small class="text-uppercase text-secondary fw-semibold d-block mb-1" id="labelClientDisplay">Klienti:</small>
                <h5 id="displayName" class="fw-bold mb-0">-</h5>
            </div>
            <div class="text-md-end flex-grow-1">
                <small class="text-uppercase text-secondary fw-semibold d-block mb-1" id="labelAddressDisplay">Adresa:</small>
                <span id="displayAddress" class="text-muted">-</span>
            </div>
        </div>
    </div>

    <div class="p-4 border rounded-4 mb-4 no-print shadow-sm">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label fw-bold small" id="labelSelectProduct">Produktet:</label>
                <div class="dropdown w-100 mb-2">
                    <button class="form-select text-start" type="button" data-bs-toggle="dropdown" id="productDropdown">
                        Zgjidh produktin...
                    </button>
                    <ul class="dropdown-menu w-100" id="productList"></ul>
                </div>
                <input type="text" id="manualProduct" class="form-control mb-2" placeholder="...">
                <button class="btn btn-sm btn-outline-secondary w-100" onclick="addManualProduct()" id="btnAddManual">Shto në listë</button>
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold small" id="labelPrice">Çmimi</label>
                <input type="number" id="price" class="form-control" placeholder="0.00">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold small" id="labelQty">Sasia</label>
                <input type="number" id="quantity" class="form-control" placeholder="0">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold small" id="labelUnit">Njësia</label>
                <select id="unit" class="form-select">
                    <option value="">-</option>
                    <option value="m²">m²</option>
                    <option value="pezzi">pezzi</option>
                </select>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-primary btn-modern w-100" onclick="addProduct()" id="btnAddProduct">Shto</button>
            </div>
        </div>
    </div>

    <div class="table-responsive shadow-sm mb-4">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th id="thProduct">Produkti</th>
                    <th id="thPrice">Çmimi</th>
                    <th id="thQuantity">Sasia</th>
                    <th id="thTotal">Totali</th>
                    <th class="d-print-none"></th>
                </tr>
            </thead>
            <tbody id="invoiceBody"></tbody>
        </table>
    </div>

    <div class="row justify-content-end">
        <div class="col-md-5">
            <div class="total-box shadow">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="text-uppercase fw-bold opacity-75" id="labelTotalFinal">Totali Final</span>
                    <strong id="grandTotal" class="total-final">0.00 €</strong>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-5 no-print">
        <button onclick="window.print()" class="btn btn-success btn-modern px-5 shadow">
            <span id="btnPrint">Printo Faturën</span>
        </button>
    </div>
</div>

<script>
let currentLang = 'sq';

const translations = {
    sq: {
        invoice: "FATURË", date: "Data:", clientName: "Emri i Klientit", clientAddress: "Adresa e Klientit",
        clientDisplay: "Klienti:", addressDisplay: "Adresa:", selectProduct: "Zgjidh produktin...",
        addManual: "Shto në listë", addProduct: "Shto", price: "Çmimi", qty: "Sasia", unit: "Njësia",
        thProduct: "Produkti", thPrice: "Çmimi", thQuantity: "Sasia", thTotal: "Totali",
        totalFinal: "Totali Final", print: "Printo Faturën", delete: "Fshi"
    },
    it: {
        invoice: "Preventivo", date: "Data:", clientName: "Nome del Cliente", clientAddress: "Indirizzo del Cliente",
        clientDisplay: "Cliente:", addressDisplay: "Indirizzo:", selectProduct: "Seleziona prodotto...",
        addManual: "Aggiungi alla lista", addProduct: "Aggiungi", price: "Prezzo", qty: "Quantità", unit: "Unità",
        thProduct: "Prodotto", thPrice: "Prezzo", thQuantity: "Quantità", thTotal: "Totale",
        totalFinal: "Totale Finale", print: "Stampa Fattura", delete: "Elimina"
    },
    en: {
        invoice: "INVOICE", date: "Date:", clientName: "Client Name", clientAddress: "Client Address",
        clientDisplay: "Client:", addressDisplay: "Address:", selectProduct: "Select product...",
        addManual: "Add to list", addProduct: "Add", price: "Price", qty: "Quantity", unit: "Unit",
        thProduct: "Product", thPrice: "Price", thQuantity: "Quantity", thTotal: "Total",
        totalFinal: "Grand Total", print: "Print Invoice", delete: "Delete"
    }
};

function updateLanguage() {
    const t = translations[currentLang];
    document.getElementById('invoiceTitle').innerText = t.invoice;
    document.getElementById('labelDate').innerText = t.date;
    document.getElementById('labelClientName').innerText = t.clientName;
    document.getElementById('labelClientAddress').innerText = t.clientAddress;
    document.getElementById('labelClientDisplay').innerText = t.clientDisplay;
    document.getElementById('labelAddressDisplay').innerText = t.addressDisplay;
    document.getElementById('productDropdown').innerText = t.selectProduct;
    document.getElementById('btnAddManual').innerText = t.addManual;
    document.getElementById('btnAddProduct').innerText = t.addProduct;
    document.getElementById('labelPrice').innerText = t.price;
    document.getElementById('labelQty').innerText = t.qty;
    document.getElementById('labelUnit').innerText = t.unit;
    document.getElementById('thProduct').innerText = t.thProduct;
    document.getElementById('thPrice').innerText = t.thPrice;
    document.getElementById('thQuantity').innerText = t.thQuantity;
    document.getElementById('thTotal').innerText = t.thTotal;
    document.getElementById('labelTotalFinal').innerText = t.totalFinal;
    document.getElementById('btnPrint').innerText = t.print;
    
    // Update existing rows delete buttons
    document.querySelectorAll('.btn-delete-row').forEach(btn => btn.innerText = t.delete);
}

document.getElementById('languageSelect').addEventListener('change', function() {
    currentLang = this.value;
    updateLanguage();
    document.getElementById("dateText").innerText = new Date().toLocaleDateString(currentLang === 'sq' ? 'sq-AL' : currentLang);
});

function updateClient() {
    document.getElementById("displayName").innerText = document.getElementById("clientName").value || "-";
    document.getElementById("displayAddress").innerText = document.getElementById("clientAddress").value || "-";
}

function addManualProduct() {
    let val = document.getElementById("manualProduct").value.trim();
    if (!val) return;
    let products = JSON.parse(localStorage.getItem("products") || "[]");
    if (!products.includes(val)) products.push(val);
    localStorage.setItem("products", JSON.stringify(products));
    document.getElementById("manualProduct").value = "";
    renderProductList();
}

function renderProductList() {
    let list = document.getElementById("productList");
    list.innerHTML = "";
    let products = JSON.parse(localStorage.getItem("products") || "[]");
    products.forEach(p => {
        let li = document.createElement("li");
        li.className = "dropdown-item d-flex justify-content-between";
        li.innerHTML = `<span onclick="selectProduct('${p}')" style="cursor:pointer">${p}</span> 
                        <span onclick="deleteStoredProduct('${p}')" style="color:red; cursor:pointer">🗑️</span>`;
        list.appendChild(li);
    });
}

function selectProduct(p) { document.getElementById("productDropdown").innerText = p; }

function deleteStoredProduct(p) {
    let products = JSON.parse(localStorage.getItem("products") || "[]");
    products = products.filter(item => item !== p);
    localStorage.setItem("products", JSON.stringify(products));
    renderProductList();
}

function addProduct() {
    let name = document.getElementById("productDropdown").innerText;
    let price = parseFloat(document.getElementById("price").value) || 0;
    let qty = parseFloat(document.getElementById("quantity").value) || 0;
    let unit = document.getElementById("unit").value;

    if (name.includes("...")) return alert("Zgjidh produktin!");

    let tr = document.createElement("tr");
    tr.innerHTML = `
        <td class="fw-medium">${name}</td>
        <td contenteditable="true">${price.toFixed(2)}</td>
        <td contenteditable="true">${qty} ${unit}</td>
        <td class="fw-bold text-primary">${(price * qty).toFixed(2)} €</td>
        <td class="d-print-none text-end">
            <button class="btn btn-sm btn-outline-danger btn-delete-row" onclick="this.closest('tr').remove(); recalc();">${translations[currentLang].delete}</button>
        </td>
    `;
    document.getElementById("invoiceBody").appendChild(tr);
    recalc();
}

function recalc() {
    let total = 0;
    document.querySelectorAll("#invoiceBody tr").forEach(row => {
        let p = parseFloat(row.cells[1].innerText) || 0;
        let q = parseFloat(row.cells[2].innerText) || 0;
        let rowTotal = p * q;
        row.cells[3].innerText = rowTotal.toFixed(2) + " €";
        total += rowTotal;
    });
    document.getElementById("grandTotal").innerText = total.toFixed(2) + " €";
}

window.onload = () => {
    renderProductList();
    updateLanguage();
    document.getElementById("dateText").innerText = new Date().toLocaleDateString('sq-AL');
};
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
